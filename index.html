<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - 專業創意圖文展版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 整體背景設定 */
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), 
                        url('夜景.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* 貼文卡片：高度獨立，避免網格撐開 */
        .geo-card {
            background: rgba(255, 255, 255, 0.98);
            clip-path: polygon(0% 0%, 100% 0%, 100% 92%, 92% 100%, 0% 100%);
            align-self: start; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .post-image {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #f1f5f9;
        }

        /* 左側固定面板 (不可移動) */
        #side-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 440px;
            height: 100vh;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            padding: 40px;
            transform: translateX(-100%); /* 初始位置 */
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 30px 0 60px rgba(0, 0, 0, 0.7);
        }
        #side-panel.open {
            transform: translateX(0); /* 滑入動畫 */
        }

        /* 遮罩 */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 圖片放置/預覽區 */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            margin: 20px 0;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .drop-zone:hover { border-color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        #preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 留言區與箭頭 */
        .comment-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .comment-section.expand {
            max-height: 700px;
            opacity: 1;
            margin-top: 1.5rem;
        }
        .arrow-btn { transition: transform 0.4s ease; }
        .arrow-btn.active { transform: rotate(180deg); }
        
        /* 滾動條美化 */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(251, 191, 36, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="togglePanel()"></div>

    <nav class="p-8 flex justify-between items-center sticky top-0 bg-black/20 backdrop-blur-xl z-40 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-full shadow-[0_0_25px_#fbbf24]"></div>
            <span class="text-3xl font-black tracking-tighter italic">GALERIA</span>
        </div>
        <div id="auth-status"></div>
    </nav>

    <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 p-12 items-start">
        </div>

    <div id="side-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black tracking-widest text-white/90">NEW POST</h2>
            <button onclick="togglePanel()" class="text-white/30 hover:text-amber-400 transition">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>

        <input type="text" id="new-title" class="w-full bg-transparent border-b-2 border-white/10 p-2 text-2xl font-black outline-none mb-8 focus:border-amber-400 transition-all" placeholder="輸入主題名稱...">

        <div class="flex gap-5 mb-4">
            <div onclick="document.getElementById('file-input').click()" class="w-12 h-12 rounded-2xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center cursor-pointer shadow-lg">
                <i class="fa-solid fa-image text-lg"></i>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center cursor-pointer shadow-lg">
                <i class="fa-solid fa-link text-lg"></i>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center cursor-pointer shadow-lg">
                <i class="fa-solid fa-camera text-lg"></i>
            </div>
        </div>

        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <img id="preview-img" src="">
            <div id="upload-ui">
                <i class="fa-solid fa-plus text-4xl mb-3 text-white/10"></i>
                <p class="text-[10px] text-white/30 uppercase font-black tracking-widest">點擊選取或拖放圖片</p>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <textarea id="new-content" 
            class="w-full h-44 bg-black/30 border border-white/5 rounded-3xl p-6 text-white placeholder:text-white/10 outline-none focus:border-amber-400/40 transition-all mb-10 resize-none"
            placeholder="描述您的創意內容..."></textarea>

        <div class="mt-auto">
            <button id="submit-post" class="w-full bg-amber-400 text-black py-5 rounded-[2rem] font-black text-xl shadow-[0_15px_35px_rgba(251,191,36,0.4)] hover:scale-[1.02] active:scale-95 transition-all">
                發佈到全球展版
            </button>
        </div>
    </div>

    <button id="add-btn" onclick="togglePanel()" 
        class="fixed bottom-12 right-12 w-24 h-24 bg-amber-400 text-black rounded-full shadow-[0_20px_50px_rgba(251,191,36,0.6)] text-6xl z-50 hover:scale-110 active:scale-90 transition-all flex items-center justify-center">
        <i class="fa-solid fa-plus"></i>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let selectedFile = null;

        // 面板與遮罩開關
        window.togglePanel = () => {
            document.getElementById('side-panel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        };

        // 選取圖片並預覽
        document.getElementById('file-input').onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('preview-img').src = event.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('upload-ui').style.display = 'none';
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        // 登入狀態監控
        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('auth-status');
            statusBox.innerHTML = user ? 
                `<button id="logout" class="text-[10px] text-white/50 font-black uppercase tracking-widest hover:text-white transition-colors">${user.displayName} (登出)</button>` : 
                `<button id="login" class="bg-amber-400 text-black px-8 py-2.5 rounded-full font-black shadow-lg hover:bg-white transition-all">GOOGLE 登入</button>`;
            if(document.getElementById('logout')) document.getElementById('logout').onclick = () => signOut(auth);
            if(document.getElementById('login')) document.getElementById('login').onclick = () => signInWithPopup(auth, provider);
        });

        // 發佈貼文 (包含圖片上傳邏輯)
        document.getElementById('submit-post').onclick = async () => {
            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            const btn = document.getElementById('submit-post');

            if(!auth.currentUser) return alert("請先登入 Google 帳號！");
            if(!title) return alert("標題是必須的喔！");

            btn.disabled = true;
            btn.innerText = "發佈中...";

            let imageUrl = "";
            try {
                // 如果有選擇檔案，先上傳到 Storage
                if (selectedFile) {
                    const storageRef = ref(storage, `posts/${Date.now()}_${selectedFile.name}`);
                    const snapshot = await uploadBytes(storageRef, selectedFile);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                // 將內容存入 Firestore
                await addDoc(collection(db, "posts"), {
                    title, content, imageUrl,
                    author: auth.currentUser.displayName,
                    createdAt: serverTimestamp(),
                    likes: []
                });

                // 清空並關閉面板
                document.getElementById('new-title').value = '';
                document.getElementById('new-content').value = '';
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('upload-ui').style.display = 'block';
                selectedFile = null;
                togglePanel();
            } catch (e) {
                console.error(e);
                alert("發佈失敗，請檢查權限設定");
            } finally {
                btn.disabled = false;
                btn.innerText = "發佈到全球展版";
            }
        };

        // 即時監聽展版貼文
        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snapshot.forEach((fbDoc) => {
                const data = fbDoc.data();
                const id = fbDoc.id;
                const liked = data.likes?.includes(auth.currentUser?.uid);
                
                const card = document.createElement('div');
                card.className = "geo-card p-8 flex flex-col";
                card.innerHTML = `
                    <div class="text-[9px] font-black text-amber-500 mb-2 tracking-widest uppercase italic opacity-80">IDEA #${id.slice(0,5)}</div>
                    <h3 class="text-3xl font-black mb-4 text-slate-900 leading-tight">${data.title}</h3>
                    
                    ${data.imageUrl ? `<img src="${data.imageUrl}" class="post-image shadow-md">` : ''}
                    
                    <p class="text-slate-600 mb-8 flex-grow text-sm leading-relaxed font-medium">${data.content}</p>
                    
                    <div class="flex justify-between items-center border-t border-slate-100 pt-6">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">By ${data.author || 'Member'}</span>
                        <button onclick="window.toggleLike('${id}', ${liked})" class="flex items-center gap-2 ${liked ? 'text-red-500' : 'text-slate-200'} transition-all hover:scale-110">
                            <span class="text-2xl">${liked ? '❤️' : '🤍'}</span> 
                            <span class="text-xs font-black text-slate-400">${data.likes?.length || 0}</span>
                        </button>
                    </div>

                    <div class="flex justify-center mt-4">
                        <button onclick="window.toggleComments('${id}')" class="p-2 text-slate-200 hover:text-amber-500 transition-all">
                            <i id="arrow-${id}" class="fa-solid fa-chevron-down arrow-btn text-2xl"></i>
                        </button>
                    </div>

                    <div id="sec-${id}" class="comment-section">
                        <div class="bg-slate-50 rounded-3xl p-6 border border-slate-200 shadow-inner">
                            <div class="flex items-center gap-3 mb-6">
                                <input type="text" id="input-${id}" placeholder="發表留言..." 
                                    class="flex-grow bg-white rounded-2xl px-5 py-3 border border-transparent focus:border-amber-400 outline-none shadow-sm text-slate-800 text-sm font-medium">
                                <button onclick="window.submitComment('${id}')" class="bg-amber-400 p-3.5 rounded-2xl shadow-lg hover:bg-amber-500 transition-all active:scale-90">
                                    <i class="fa-solid fa-paper-plane text-black"></i>
                                </button>
                            </div>
                            <div id="list-${id}" class="space-y-4 max-h-64 overflow-y-auto pr-2 custom-scroll"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                loadComments(id);
            });
        });

        // 留言發送與載入
        window.submitComment = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            if(!auth.currentUser || !input.value.trim()) return alert("登入後即可留言！");
            await addDoc(collection(db, "posts", postId, "comments"), {
                text: input.value.trim(), user: auth.currentUser.displayName, createdAt: serverTimestamp()
            });
            input.value = '';
        };

        window.toggleComments = (id) => {
            const target = document.getElementById(`sec-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isOpened = target.classList.contains('expand');
            document.querySelectorAll('.comment-section').forEach(s => s.classList.remove('expand'));
            document.querySelectorAll('.arrow-btn').forEach(a => a.classList.remove('active'));
            if(!isOpened) { target.classList.add('expand'); arrow.classList.add('active'); }
        };

        // 點讚功能
        window.toggleLike = async (id, liked) => {
            if(!auth.currentUser) return alert("請登入後點讚");
            await updateDoc(doc(db, "posts", id), {
                likes: liked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        // 讀取留言
        function loadComments(postId) {
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")), (snap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = snap.docs.map(d => `
                        <div class="bg-white p-4 rounded-2xl border-l-4 border-amber-400 shadow-sm animate-fade-in">
                            <b class="text-amber-600 text-[10px] uppercase block mb-1 font-black tracking-widest">${d.data().user}</b>
                            <span class="text-slate-700 font-semibold text-xs leading-relaxed">${d.data().text}</span>
                        </div>`).join('');
                }
            });
        }
    </script>
</body>
</html>
