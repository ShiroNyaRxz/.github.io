<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆與交流處 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }

        .header-container { border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; margin-bottom: 20px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }

        .input-card { 
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 15px; 
            width: 100%; max-width: 400px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .nickname-input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fffdf5; }
        textarea { resize: none; min-height: 80px; }
        .submit-btn { background: var(--shrine-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .submit-btn:disabled { background: #555; }

        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .ema-container { width: 250px; height: 180px; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg); }
        .ema-front, .ema-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); padding: 35px 20px 15px; box-sizing: border-box; display: flex; flex-direction: column; }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.9); }
        .wish-text { font-weight: bold; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 1em; color: var(--text-color); }

        /* 懸浮聊天室 */
        #chat-window { 
            position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); 
            border: 2px solid var(--shrine-red); border-radius: 12px; 
            display: flex; flex-direction: column; z-index: 9999; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        #chat-header { 
            padding: 10px; color: white; background: var(--shrine-red); 
            cursor: move; font-weight: bold; text-align: center; border-radius: 8px 8px 0 0;
            user-select: none;
        }
        .chat-user-setup { padding: 8px; background: rgba(255,255,255,0.1); border-bottom: 1px solid #444; display: flex; gap: 5px; }
        .chat-user-setup input { flex: 1; background: #222; border: 1px solid #555; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { background: rgba(255, 255, 255, 0.1); color: #eee; padding: 6px 10px; border-radius: 8px; align-self: flex-start; max-width: 90%; font-size: 0.9em; }
        .msg-bubble b { color: var(--shrine-red); font-size: 0.8em; display: block; }
        
        .chat-input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; }
        .chat-send-btn { background: var(--shrine-red); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-container"><header><h1>⛩️ 許願牆 ⛩️</h1></header></div>
    
    <div class="input-card">
        <input type="text" id="nickname" class="nickname-input" maxlength="15" placeholder="名號">
        <textarea id="content" maxlength="100" placeholder="願望"></textarea>
        <button class="submit-btn" id="submit-btn" onclick="window.submitWish()">奉納願望</button>
    </div>

    <div id="ema-board"></div>

    <div id="chat-window">
        <div id="chat-header">✥ 交流處 (按住拖動)</div>
        <div class="chat-user-setup">
            <input type="text" id="chat-user-name" placeholder="自定稱呼" onchange="window.saveChatName(this.value)">
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') window.sendChat()">
            <button class="chat-send-btn" onclick="window.sendChat()">送出</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction, limitToLast, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com", 
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishesRef = ref(db, 'wishes');
        const chatRef = ref(db, 'chat');

        const deviceId = localStorage.getItem('shrine_visitor_id') || ('v_' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('shrine_visitor_id', deviceId);

        // 讀取紀錄的稱呼
        const savedName = localStorage.getItem('chat_display_name');
        if(savedName) document.getElementById('chat-user-name').value = savedName;

        window.saveChatName = (val) => localStorage.setItem('chat_display_name', val);

        function sanitize(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        function startTimer() {
            const btn = document.getElementById('submit-btn');
            const last = localStorage.getItem('shrine_cooldown');
            if (last) {
                const diff = Date.now() - parseInt(last);
                if (diff < 300000) {
                    const rem = Math.ceil((300000 - diff) / 1000);
                    btn.disabled = true;
                    btn.innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                    setTimeout(startTimer, 1000);
                    return;
                }
            }
            btn.disabled = false;
            btn.innerText = "奉納願望";
        }
        startTimer();

        // 許願牆邏輯
        onValue(wishesRef, (snapshot) => {
            const board = document.getElementById('ema-board');
            board.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const w = data[key];
                    const container = document.createElement('div');
                    container.className = 'ema-container';
                    container.innerHTML = `
                        <div class="ema-card" onclick="this.classList.toggle('is-flipped')">
                            <div class="ema-front" style="background-color: ${w.color};">
                                <div class="meta-top">${sanitize(w.nickname)}</div>
                                <div class="wish-text">${sanitize(w.content)}</div>
                                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.7em;">
                                    <span>${w.date}</span>
                                    <span onclick="event.stopPropagation(); window.like('${key}')" style="cursor:pointer;">❤️ ${w.likes || 0}</span>
                                </div>
                            </div>
                            <div class="ema-back" style="background-color: ${w.color};">
                                <div style="flex-grow:1; font-size:0.8em; overflow-y:auto;" id="msg-${key}"></div>
                                <button style="width:100%; font-size:10px;" onclick="event.stopPropagation(); window.addMsg('${key}')">留言</button>
                            </div>
                        </div>`;
                    board.appendChild(container);
                    if (w.comments) {
                        const box = document.getElementById(`msg-${key}`);
                        Object.values(w.comments).forEach(c => {
                            const d = document.createElement('div');
                            d.innerHTML = `<b>${sanitize(c.user)}:</b> ${sanitize(c.text)}`;
                            box.appendChild(d);
                        });
                    }
                });
            }
        });

        // 聊天室邏輯
        onValue(query(chatRef, limitToLast(50)), (snapshot) => {
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'msg-bubble';
                    div.innerHTML = `<b>${sanitize(m.user)}</b>${sanitize(m.text)}`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        window.sendChat = () => {
            const input = document.getElementById('chat-input');
            const nick = document.getElementById('chat-user-name').value.trim() || "訪客";
            const text = input.value.trim();
            if (!text) return;
            push(chatRef, { user: nick, text: text, time: Date.now() });
            input.value = '';
        };

        window.submitWish = () => {
            const nick = document.getElementById('nickname').value.trim() || "無名氏";
            const text = document.getElementById('content').value.trim();
            if (!text) return;
            push(wishesRef, {
                nickname: nick, content: text, likes: 0, voters: {},
                date: new Date().toLocaleDateString(),
                color: ['#fff9c4', '#f8bbd0', '#e1f5fe', '#e8f5e9'][Math.floor(Math.random() * 4)]
            }).then(() => {
                localStorage.setItem('shrine_cooldown', Date.now());
                startTimer();
                document.getElementById('content').value = '';
            });
        };

        window.like = (id) => {
            runTransaction(ref(db, `wishes/${id}`), (w) => {
                if (w) {
                    w.voters = w.voters || {};
                    if (w.voters[deviceId]) { w.likes--; delete w.voters[deviceId]; }
                    else { w.likes = (w.likes || 0) + 1; w.voters[deviceId] = true; }
                }
                return w;
            });
        };

        window.addMsg = (id) => {
            const u = document.getElementById('chat-user-name').value.trim() || "訪客";
            const t = prompt("留言內容");
            if (t) push(ref(db, `wishes/${id}/comments`), { user: u, text: t });
        };

        // 拖動功能實作
        const dragHeader = document.getElementById('chat-header');
        const chatWin = document.getElementById('chat-window');
        let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        dragHeader.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            if (e.target === dragHeader) isDragging = true;
        }
        function dragMove(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                chatWin.style.transform = `translate(${currentX}px, ${currentY}px)`;
            }
        }
        function dragEnd() { isDragging = false; }
    </script>
</body>
</html>
