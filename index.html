<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        .input-section { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 40px; width: 100%; max-width: 400px; 
        }
        .nickname-input, textarea { 
            width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-size: 1em; background: #fffdf0; 
        }
        .primary-btn { 
            background: var(--shrine-red); color: white; border: none; padding: 14px; 
            width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; 
            font-size: 1.1em; transition: 0.3s; 
        }
        .primary-btn:disabled { background: #555; cursor: not-allowed; }
        
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; padding-bottom: 50px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); 
            padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; 
        }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.8em; color: var(--text-color); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; font-weight: bold; overflow: hidden; }
        .wish-content { font-size: 1.1em; font-weight: bold; color: var(--text-color); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow-y: auto; word-break: break-all; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .small-btn { background: rgba(0,0,0,0.1); border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .small-btn.active { background: #ff4d4d !important; color: white !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
    </div>

    <div class="input-section">
        <input type="text" id="custom-nickname" class="nickname-input" maxlength="10">
        <textarea id="wish-text" rows="3" maxlength="50"></textarea>
        <button class="primary-btn" id="submit-wish-btn" onclick="window.addNewWish()">奉納</button>
    </div>

    <div id="ema-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com", 
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishesRef = ref(db, 'wishes');

        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        let deviceId = localStorage.getItem('shrine_id') || ('id_' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('shrine_id', deviceId);

        function checkCooldown() {
            const btn = document.getElementById('submit-wish-btn');
            const last = localStorage.getItem('last_post');
            const period = 300000;
            if (last) {
                const diff = Date.now() - parseInt(last);
                if (diff < period) {
                    const rem = Math.ceil((period - diff) / 1000);
                    btn.disabled = true;
                    btn.innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                    setTimeout(checkCooldown, 1000);
                    return;
                }
            }
            btn.disabled = false;
            btn.innerText = "奉納";
        }
        checkCooldown();

        onValue(wishesRef, (snapshot) => {
            const board = document.getElementById('ema-board');
            board.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const wish = data[key];
                    const isLiked = wish.voters && wish.voters[deviceId];
                    renderWish(board, key, wish, isLiked);
                });
            }
        });

        function renderWish(board, id, wish, isLiked) {
            const container = document.createElement('div');
            container.className = 'ema-container';
            const sNick = sanitize(wish.nickname || '無名');
            const sContent = sanitize(wish.content || '');

            container.innerHTML = `
                <div class="ema-card" onclick="this.classList.toggle('is-flipped')">
                    <div class="ema-front" style="background-color: ${wish.color || '#fff9c4'};">
                        <div class="meta-top">${sNick}</div>
                        <div class="wish-content">${sContent}</div>
                        <div class="footer-actions">
                            <span style="font-size: 0.7em;">${wish.date}</span>
                            <button class="small-btn ${isLiked ? 'active' : ''}" onclick="event.stopPropagation(); window.handleLike('${id}')">
                                ❤️ <span>${wish.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                    <div class="ema-back" style="background-color: ${wish.color || '#fff9c4'};">
                        <div style="flex-grow:1; font-size:0.8em; overflow-y:auto;" id="msg-${id}"></div>
                        <button class="small-btn" style="width:100%; margin-top:5px; background:var(--shrine-red); color:white;" onclick="event.stopPropagation(); window.addComment('${id}')">留言</button>
                    </div>
                </div>
            `;
            board.appendChild(container);

            const mBox = document.getElementById(`msg-${id}`);
            if (wish.comments) {
                Object.values(wish.comments).forEach(c => {
                    const d = document.createElement('div');
                    d.style.marginBottom = '2px';
                    const b = document.createElement('b');
                    b.textContent = c.user + ': ';
                    d.appendChild(b);
                    d.append(document.createTextNode(c.text));
                    mBox.appendChild(d);
                });
            }
        }

        window.addNewWish = () => {
            const nick = document.getElementById('custom-nickname').value.trim();
            const text = document.getElementById('wish-text').value.trim();
            if (!text) return;
            push(wishesRef, {
                nickname: nick || "無名",
                content: text,
                likes: 0,
                voters: {},
                date: new Date().toLocaleDateString(),
                color: ['#fff9c4', '#f8bbd0', '#e1f5fe', '#e8f5e9'][Math.floor(Math.random() * 4)],
                rotate: Math.floor(Math.random() * 6) - 3
            }).then(() => {
                localStorage.setItem('last_post', Date.now());
                checkCooldown();
                document.getElementById('wish-text').value = '';
                document.getElementById('custom-nickname').value = '';
            });
        };

        window.handleLike = (id) => {
            runTransaction(ref(db, `wishes/${id}`), (w) => {
                if (w) {
                    w.voters = w.voters || {};
                    if (w.voters[deviceId]) { w.likes--; delete w.voters[deviceId]; }
                    else { w.likes = (w.likes || 0) + 1; w.voters[deviceId] = true; }
                }
                return w;
            });
        };

        window.addComment = (id) => {
            const u = prompt("名號") || "訪客";
            const t = prompt("內容");
            if (t) push(ref(db, `wishes/${id}/comments`), { user: u, text: t });
        };
    </script>
</body>
</html>
