<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 (實名限讚版) ⛩️</title>
    <style>
        /* 保留原本的所有 CSS 樣式 */
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        .auth-section { margin-bottom: 20px; text-align: center; color: white; }
        .login-btn { background: white; color: #444; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; margin: 0 auto; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-info { display: none; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 8px 15px; border-radius: 30px; backdrop-filter: blur(5px); }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }
        .input-section { display: none; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 40px; width: 100%; max-width: 450px; }
        .nickname-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        textarea { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; min-height: 80px; }
        .primary-btn { background: var(--shrine-red); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .ema-front { z-index: 2; }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.8em; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; }
        .wish-content { font-size: 1.1em; font-weight: bold; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; }
        .small-btn { background: rgba(0,0,0,0.1); border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .small-btn.active { background: #ff4d4d !important; color: white !important; }
    </style>
</head>
<body>

    <audio id="bgm-player" src="bgm.mp3" loop></audio>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
        <button id="music-toggle" onclick="window.toggleMusic()">靜</button>
    </div>

    <div class="auth-section">
        <button id="login-btn" class="login-btn" onclick="window.login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google 登入後許願/點讚
        </button>
        <div id="user-info" class="user-info">
            <img id="user-pic" src="">
            <span id="user-display-name"></span>
            <button class="small-btn" style="color:white; background:rgba(0,0,0,0.3)" onclick="window.logout()">登出</button>
        </div>
    </div>

    <div class="input-section" id="wish-input-area">
        <input type="text" id="custom-nickname" class="nickname-input" placeholder="想要顯示的自定義暱稱 (選填)">
        <textarea id="wish-text" rows="3" placeholder="請在此輸入您的願望..."></textarea>
        <button class="primary-btn" onclick="window.addNewWish()">正式奉納 (掛上願望)</button>
    </div>

    <div id="ema-board"></div>
