<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        
        /* 登入控制 */
        .auth-zone { margin-bottom: 20px; }
        #login-btn { background: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        #user-profile { display: none; color: white; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        #user-profile img { width: 30px; height: 30px; border-radius: 50%; }

        /* 輸入區 (預設隱藏) */
        .input-section { 
            display: none; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            padding: 25px; border-radius: 12px; margin-bottom: 40px; width: 100%; max-width: 400px; 
        }
        .nickname-input, textarea { 
            width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-size: 1em; background: #fffdf0; 
        }
        .primary-btn { 
            background: var(--shrine-red); color: white; border: none; padding: 14px; 
            width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        .primary-btn:disabled { background: #555; cursor: not-allowed; }
        
        /* 許願牆面 */
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); 
            padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; 
        }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.8em; color: var(--text-color); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; font-weight: bold; }
        .wish-content { font-size: 1.1em; font-weight: bold; color: var(--text-color); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow-y: auto; word-break: break-all; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; }
        .small-btn { background: rgba(0,0,0,0.1); border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .active-like { background: #ff4d4d !important; color: white !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
    </div>

    <div class="auth-zone">
        <button id="login-btn" onclick="window.login()">Google Login</button>
        <div id="user-profile">
            <img id="u-pic" src="">
            <span id="u-name"></span>
            <button onclick="window.logout()" style="background:none; border:1px solid white; color:white; border-radius:10px; font-size:10px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="input-section" id="post-box">
        <input type="text" id="custom-nickname" class="nickname-input" maxlength="10">
        <textarea id="wish-text" rows="3" maxlength="50"></textarea>
        <button class="primary-btn" id="submit-btn" onclick="window.addNewWish()">奉納</button>
    </div>

    <div id="ema-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com", 
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const wishesRef = ref(db, 'wishes');

        let currentUser = null;

        // XSS 防禦函式
        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 登入狀態監控
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const lBtn = document.getElementById('login-btn');
            const prof = document.getElementById('user-profile');
            const box = document.getElementById('post-box');
            if (user) {
                lBtn.style.display = 'none';
                prof.style.display = 'flex';
                box.style.display = 'block';
                document.getElementById('u-name').textContent = user.displayName;
                document.getElementById('u-pic').src = user.photoURL;
            } else {
                lBtn.style.display = 'flex';
                prof.style.display = 'none';
                box.style.display = 'none';
            }
        });

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        // 冷卻計時
        function checkTimer() {
            const btn = document.getElementById('submit-btn');
            const last = localStorage.getItem('last_p');
            if (last) {
                const diff = Date.now() - parseInt(last);
                if (diff < 300000) {
                    const rem = Math.ceil((300000 - diff) / 1000);
                    btn.disabled = true;
                    btn.innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                    setTimeout(checkTimer, 1000);
                    return;
                }
            }
            btn.disabled = false;
            btn.innerText = "奉納";
        }
        checkTimer();

        // 渲染牆面
        onValue(wishesRef, (snap) => {
            const board = document.getElementById('ema-board');
            board.innerHTML = '';
            const data = snap.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const w = data[key];
                    const isL = currentUser && w.voters && w.voters[currentUser.uid];
                    render(board, key, w, isL);
                });
            }
        });

        function render(board, id, w, isL) {
            const container = document.createElement('div');
            container.className = 'ema-container';
            const sNick = sanitize(w.nickname || w.author);
            const sText = sanitize(w.content);

            container.innerHTML = `
                <div class="ema-card" onclick="this.classList.toggle('is-flipped')">
                    <div class="ema-front" style="background-color: ${w.color};">
                        <div class="meta-top">${sNick}</div>
                        <div class="wish-content">${sText}</div>
                        <div class="footer-actions">
                            <span style="font-size: 0.7em;">${w.date}</span>
                            <button class="small-btn ${isL ? 'active-like' : ''}" onclick="event.stopPropagation(); window.handleLike('${id}')">
                                ❤️ <span>${w.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                    <div class="ema-back" style="background-color: ${w.color};">
                        <div style="flex-grow:1; font-size:0.8em; overflow-y:auto;" id="c-${id}"></div>
                        <button class="small-btn" style="width:100%; margin-top:5px; background:var(--shrine-red); color:white;" onclick="event.stopPropagation(); window.addC('${id}')">留言</button>
                    </div>
                </div>
            `;
            board.appendChild(container);
            
            const cBox = document.getElementById(`c-${id}`);
            if (w.comments) {
                Object.values(w.comments).forEach(c => {
                    const d = document.createElement('div');
                    const b = document.createElement('b');
                    b.textContent = sanitize(c.user) + ': ';
                    d.appendChild(b);
                    d.append(document.createTextNode(c.text));
                    cBox.appendChild(d);
                });
            }
        }

        window.addNewWish = () => {
            const nick = document.getElementById('custom-nickname').value.trim();
            const text = document.getElementById('wish-text').value.trim();
            if (!text || !currentUser) return;

            push(wishesRef, {
                author: currentUser.displayName,
                nickname: nick || currentUser.displayName,
                content: text,
                likes: 0,
                voters: {},
                uid: currentUser.uid,
                date: new Date().toLocaleDateString(),
                color: ['#fff9c4', '#f8bbd0', '#e1f5fe', '#e8f5e9'][Math.floor(Math.random() * 4)],
                rotate: Math.floor(Math.random() * 6) - 3
            }).then(() => {
                localStorage.setItem('last_p', Date.now());
                checkTimer();
                document.getElementById('wish-text').value = '';
                document.getElementById('custom-nickname').value = '';
            });
        };

        window.handleLike = (id) => {
            if (!currentUser) return alert("Login required");
            runTransaction(ref(db, `wishes/${id}`), (w) => {
                if (w) {
                    w.voters = w.voters || {};
                    if (w.voters[currentUser.uid]) { w.likes--; delete w.voters[currentUser.uid]; }
                    else { w.likes = (w.likes || 0) + 1; w.voters[currentUser.uid] = true; }
                }
                return w;
            });
        };

        window.addC = (id) => {
            if (!currentUser) return;
            const t = prompt("Message");
            if (t) push(ref(db, `wishes/${id}/comments`), { user: currentUser.displayName, text: t });
        };
    </script>
</body>
</html>
