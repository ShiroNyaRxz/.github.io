<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        .input-card { 
            background: rgba(255, 255, 255, 0.95); padding: 25px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; max-width: 450px; margin-bottom: 40px; 
        }
        .nickname-input, textarea { 
            width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 1em; background: #fffdf5; 
        }
        ::placeholder { color: #888; font-size: 0.9em; }
        textarea { resize: none; min-height: 100px; }
        .submit-btn { 
            background: #555; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2em; 
        }
        .submit-btn:not(:disabled) { background: var(--shrine-red); }
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); 
            padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; 
        }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.85em; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: bold; }
        .wish-text { font-size: 1.1em; font-weight: bold; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; word-break: break-all; }
        .footer { display: flex; justify-content: space-between; align-items: center; }
        .like-btn { background: rgba(0,0,0,0.05); border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .liked { background: var(--shrine-red) !important; color: white !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
    </div>

    <div class="input-card">
        <input type="text" id="nickname" class="nickname-input" maxlength="15" placeholder="想要顯示的名號 (選填)">
        <textarea id="content" maxlength="100" placeholder="在此誠心寫下您的願望..."></textarea>
        <button class="submit-btn" id="submit-btn" onclick="window.submitWish()">奉納願望</button>
    </div>

    <div id="ema-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com", 
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishesRef = ref(db, 'wishes');

        let deviceId = localStorage.getItem('shrine_visitor_id');
        if (!deviceId) {
            deviceId = 'v_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('shrine_visitor_id', deviceId);
        }

        function sanitize(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        function startTimer() {
            const btn = document.getElementById('submit-btn');
            const last = localStorage.getItem('shrine_cooldown');
            if (last) {
                const diff = Date.now() - parseInt(last);
                if (diff < 300000) {
                    const rem = Math.ceil((300000 - diff) / 1000);
                    btn.disabled = true;
                    btn.innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                    setTimeout(startTimer, 1000);
                    return;
                }
            }
            btn.disabled = false;
            btn.innerText = "奉納願望";
        }
        startTimer();

        onValue(wishesRef, (snapshot) => {
            const board = document.getElementById('ema-board');
            board.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const w = data[key];
                    const isLiked = w.voters && w.voters[deviceId];
                    renderEma(board, key, w, isLiked);
                });
            }
        });

        function renderEma(board, id, w, isLiked) {
            const container = document.createElement('div');
            container.className = 'ema-container';
            const sNick = sanitize(w.nickname || "匿名人士");
            const sText = sanitize(w.content);
            container.innerHTML = `
                <div class="ema-card" onclick="this.classList.toggle('is-flipped')">
                    <div class="ema-front" style="background-color: ${w.color || '#fff9c4'};">
                        <div class="meta-top">祈願人：${sNick}</div>
                        <div class="wish-text">${sText}</div>
                        <div class="footer">
                            <span style="font-size:0.7em;">${w.date}</span>
                            <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); window.like('${id}')">
                                ❤️ ${w.likes || 0}
                            </button>
                        </div>
                    </div>
                    <div class="ema-back" style="background-color: ${w.color || '#fff9c4'};">
                        <strong style="font-size:0.8em; border-bottom:1px solid rgba(0,0,0,0.1);">溫暖回饋</strong>
                        <div style="flex-grow:1; font-size:0.8em; overflow-y:auto; margin-top:5px; text-align:left;" id="msg-${id}"></div>
                        <button class="like-btn" style="width:100%; margin-top:5px;" onclick="event.stopPropagation(); window.addMsg('${id}')">留言</button>
                    </div>
                </div>
            `;
            board.appendChild(container);
            if (w.comments) {
                const box = document.getElementById(`msg-${id}`);
                Object.values(w.comments).forEach(c => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${sanitize(c.user)}:</b> ${sanitize(c.text)}`;
                    box.appendChild(d);
                });
            }
        }

        window.submitWish = () => {
            const nick = document.getElementById('nickname').value.trim();
            const text = document.getElementById('content').value.trim();
            if (!text) return;
            push(wishesRef, {
                nickname: nick || "匿名人士",
                content: text,
                likes: 0,
                voters: {},
                visitorId: deviceId,
                date: new Date().toLocaleDateString(),
                color: ['#fff9c4', '#f8bbd0', '#e1f5fe', '#e8f5e9'][Math.floor(Math.random() * 4)]
            }).then(() => {
                localStorage.setItem('shrine_cooldown', Date.now());
                startTimer();
                document.getElementById('content').value = '';
                document.getElementById('nickname').value = '';
            });
        };

        window.like = (id) => {
            runTransaction(ref(db, `wishes/${id}`), (w) => {
                if (w) {
                    w.voters = w.voters || {};
                    if (w.voters[deviceId]) { w.likes--; delete w.voters[deviceId]; }
                    else { w.likes = (w.likes || 0) + 1; w.voters[deviceId] = true; }
                }
                return w;
            });
        };

        window.addMsg = (id) => {
            const u = prompt("您的稱呼？") || "匿名人士";
            const t = prompt("想說的話？");
            if (t) push(ref(db, `wishes/${id}/comments`), { user: u, text: t });
        };
    </script>
</body>
</html>
