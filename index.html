<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - 專業創意互動展版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 背景與整體布局 */
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('夜景.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* 貼文卡片：高度獨立，避免互相撐開 */
        .geo-card {
            background: rgba(255, 255, 255, 0.98);
            clip-path: polygon(0% 0%, 100% 0%, 100% 92%, 92% 100%, 0% 100%);
            align-self: start; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1e293b;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* 側邊編輯框：固定左側，帶有滑入動畫 */
        #side-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 420px;
            height: 100vh;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            padding: 40px;
            transform: translateX(-100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 25px 0 50px rgba(0, 0, 0, 0.6);
        }

        #side-panel.open {
            transform: translateX(0);
        }

        /* 點擊遮罩 */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 多功能拖放區 */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            cursor: pointer;
            margin: 20px 0;
        }
        .drop-zone:hover {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
        }

        /* 留言區與箭頭動畫 */
        .comment-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .comment-section.expand {
            max-height: 600px;
            opacity: 1;
            margin-top: 1.5rem;
        }
        .arrow-btn { transition: transform 0.4s ease; }
        .arrow-btn.active { transform: rotate(180deg); }

        /* 輸入框樣式 */
        .title-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            padding: 10px 0;
            font-size: 28px;
            font-weight: 800;
            color: white;
            outline: none;
            margin-bottom: 20px;
        }
        .title-input:focus { border-color: #fbbf24; }
    </style>
</head>
<body>

    <!-- 遮罩層 -->
    <div id="overlay" onclick="togglePanel()"></div>

    <!-- 頂部導覽 -->
    <nav class="p-8 flex justify-between items-center sticky top-0 bg-black/10 backdrop-blur-lg z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-full shadow-[0_0_20px_#fbbf24]"></div>
            <span class="text-3xl font-black tracking-tighter italic text-white">GALERIA</span>
        </div>
        <div id="auth-status"></div>
    </nav>

    <!-- 主內容區 -->
    <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 p-12 items-start">
        <!-- 卡片會動態載入至此 -->
    </div>

    <!-- 左側固定編輯面板 -->
    <div id="side-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black tracking-widest text-white/90">CREATE POST</h2>
            <button onclick="togglePanel()" class="text-white/40 hover:text-amber-400 transition">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
        </div>

        <input type="text" id="new-title" class="title-input" placeholder="主題標題...">

        <!-- 功能列 -->
        <div class="flex gap-4 mb-4">
            <button class="w-12 h-12 rounded-xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center">
                <i class="fa-solid fa-image"></i>
            </button>
            <button class="w-12 h-12 rounded-xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center">
                <i class="fa-solid fa-link"></i>
            </button>
            <button class="w-12 h-12 rounded-xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center">
                <i class="fa-solid fa-camera"></i>
            </button>
            <button class="w-12 h-12 rounded-xl bg-white/5 hover:bg-amber-400 hover:text-black transition flex items-center justify-center">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <!-- 放置區域 -->
        <div class="drop-zone">
            <i class="fa-solid fa-cloud-arrow-up text-4xl mb-3 text-white/20"></i>
            <p class="text-xs text-white/30 uppercase font-bold tracking-widest">點擊或拖放媒體文件</p>
        </div>

        <textarea id="new-content" 
            class="w-full h-40 bg-black/30 border border-white/5 rounded-2xl p-5 text-white placeholder:text-white/10 outline-none focus:border-amber-400/50 transition-all mb-8 resize-none"
            placeholder="輸入詳細內容..."></textarea>

        <div class="mt-auto pt-10 border-t border-white/5">
            <button id="submit-post" class="w-full bg-amber-400 text-black py-5 rounded-3xl font-black text-xl shadow-[0_10px_30px_rgba(251,191,36,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
                發佈到展版
            </button>
            <button onclick="togglePanel()" class="w-full mt-4 py-2 text-white/20 hover:text-white/60 transition text-sm font-bold uppercase tracking-widest">
                取消
            </button>
        </div>
    </div>

    <!-- 右下角觸發按鈕 -->
    <button id="add-btn" onclick="togglePanel()" 
        class="fixed bottom-12 right-12 w-24 h-24 bg-amber-400 text-black rounded-full shadow-[0_15px_45px_rgba(251,191,36,0.5)] text-6xl z-50 hover:scale-110 active:scale-90 transition-all flex items-center justify-center">
        <i class="fa-solid fa-plus"></i>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 側邊欄控制
        window.togglePanel = () => {
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('show');
        };

        // 權限與登入
        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('auth-status');
            statusBox.innerHTML = user ? 
                `<button id="logout" class="text-[10px] text-white/50 font-black uppercase tracking-widest hover:text-white transition">${user.displayName} (退出)</button>` : 
                `<button id="login" class="bg-amber-400 text-black px-8 py-3 rounded-full font-black shadow-lg">GOOGLE LOGIN</button>`;
            
            if(document.getElementById('logout')) document.getElementById('logout').onclick = () => signOut(auth);
            if(document.getElementById('login')) document.getElementById('login').onclick = () => signInWithPopup(auth, provider);
        });

        // 監聽展版貼文
        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snapshot.forEach((fbDoc) => {
                const data = fbDoc.data();
                const id = fbDoc.id;
                const liked = data.likes?.includes(auth.currentUser?.uid);
                
                const card = document.createElement('div');
                card.className = "geo-card p-8 flex flex-col";
                card.innerHTML = `
                    <div class="text-[9px] font-black text-amber-500 mb-2 tracking-[0.2em] uppercase">SYSTEM ID: ${id.slice(0,5)}</div>
                    <h3 class="text-3xl font-black mb-4 text-slate-900 leading-none">${data.title}</h3>
                    <p class="text-slate-600 mb-8 flex-grow text-sm leading-relaxed">${data.content}</p>
                    
                    <div class="flex justify-between items-center border-t border-slate-100 pt-6">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Post by ${data.author || 'Anonymous'}</span>
                        <button onclick="window.toggleLike('${id}', ${liked})" class="flex items-center gap-2 ${liked ? 'text-red-500' : 'text-slate-200'} transition-all hover:scale-110">
                            <span class="text-2xl">${liked ? '❤️' : '🤍'}</span> 
                            <span class="text-xs font-black text-slate-400">${data.likes?.length || 0}</span>
                        </button>
                    </div>

                    <!-- 展開箭頭 -->
                    <div class="flex justify-center mt-4">
                        <button onclick="window.toggleComments('${id}')" class="p-2 text-slate-200 hover:text-amber-400 transition-all">
                            <i id="arrow-${id}" class="fa-solid fa-chevron-down arrow-btn text-2xl"></i>
                        </button>
                    </div>

                    <!-- 獨立留言區 -->
                    <div id="sec-${id}" class="comment-section">
                        <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200 shadow-inner">
                            <div class="flex items-center gap-3 mb-5">
                                <input type="text" id="input-${id}" placeholder="新增評論..." 
                                    class="flex-grow bg-white rounded-xl px-5 py-3 border border-transparent focus:border-amber-400 outline-none shadow-sm text-slate-800 text-sm">
                                <button onclick="window.submitComment('${id}')" class="bg-amber-400 p-3.5 rounded-xl shadow-md hover:bg-amber-500 transition-all">
                                    <i class="fa-solid fa-paper-plane text-black"></i>
                                </button>
                            </div>
                            <div id="list-${id}" class="space-y-4 max-h-64 overflow-y-auto pr-2 custom-scroll"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                loadComments(id);
            });
        });

        // 提交新貼文
        document.getElementById('submit-post').onclick = async () => {
            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            
            if(!auth.currentUser) return alert("請先登入！");
            if(!title || !content) return alert("標題或內容不能為空");

            try {
                await addDoc(collection(db, "posts"), {
                    title, content, author: auth.currentUser.displayName, createdAt: serverTimestamp(), likes: []
                });
                document.getElementById('new-title').value = '';
                document.getElementById('new-content').value = '';
                togglePanel();
            } catch (e) {
                console.error(e);
            }
        };

        // 留言處理
        window.submitComment = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();
            if(!auth.currentUser) return alert("登入即可發表留言");
            if(!text) return;

            await addDoc(collection(db, "posts", postId, "comments"), {
                text, user: auth.currentUser.displayName, createdAt: serverTimestamp()
            });
            input.value = '';
        };

        // 切換留言顯示
        window.toggleComments = (id) => {
            const target = document.getElementById(`sec-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isOpened = target.classList.contains('expand');
            
            document.querySelectorAll('.comment-section').forEach(s => s.classList.remove('expand'));
            document.querySelectorAll('.arrow-btn').forEach(a => a.classList.remove('active'));

            if(!isOpened) {
                target.classList.add('expand');
                arrow.classList.add('active');
            }
        };

        // 點讚功能
        window.toggleLike = async (id, liked) => {
            if(!auth.currentUser) return alert("請先登入");
            await updateDoc(doc(db, "posts", id), {
                likes: liked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        // 加載留言
        function loadComments(postId) {
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")), (snap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = snap.docs.map(d => `
                        <div class="bg-white p-4 rounded-xl border-l-4 border-amber-400 shadow-sm">
                            <b class="text-amber-600 text-[10px] uppercase block mb-1 font-black">${d.data().user}</b>
                            <span class="text-slate-700 font-medium text-xs leading-relaxed">${d.data().text}</span>
                        </div>`).join('');
                }
            });
        }
    </script>
</body>
</html>
