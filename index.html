<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 ⛩️</title>
    <style>
        :root {
            --shrine-red: #ff4d4d;
            --text-color: #3e2723;
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('夜景.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* 標題與音樂開關容器 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 5px double var(--shrine-red);
            padding-bottom: 10px;
        }

        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }

        #music-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white; font-size: 22px;
            width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(5px);
        }

        #music-toggle:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.4); }

        .sub-title { color: #f0f0f0; text-align: center; margin-bottom: 30px; font-size: 0.9em; }

        /* 輸入區域 */
        .input-section {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4); margin-bottom: 40px;
            width: 100%; max-width: 450px;
        }

        input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .primary-btn { background: var(--shrine-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em; }

        /* 許願牌網格 */
        #ema-board {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px; width: 100%; max-width: 1200px; perspective: 1000px;
        }

        .ema-container { width: 280px; height: 200px; position: relative; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }

        .ema-front, .ema-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
            padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }

        .meta-top { font-size: 0.8em; color: rgba(0,0,0,0.5); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; }
        .wish-content { font-size: 1.1em; font-weight: bold; color: var(--text-color); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .small-btn { background: rgba(0,0,0,0.1); border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; position: relative; }

        /* ❤️ 愛心動畫 ❤️ */
        @keyframes singleHeartPop {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.8); opacity: 0; }
        }
        .heart-pop { position: absolute; color: #ff4081; font-size: 30px; top: -35px; left: 50%; transform: translateX(-50%); pointer-events: none; animation: singleHeartPop 1s ease-out forwards; }
    </style>
</head>
<body>

    <audio id="bgm-player" src="bgm.mp3" loop preload="auto"></audio>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
        <button id="music-toggle" onclick="toggleMusic()">🔇</button>
    </div>
    <div class="sub-title">留下你的願望，說不定會實現喔！</div>

    <div class="input-section">
        <input type="text" id="author-name" placeholder="你的大名">
        <textarea id="wish-text" rows="3" placeholder="寫下你的願望..."></textarea>
        <button class="primary-btn" onclick="addNewWish()">奉納 (掛上願望)</button>
    </div>

    <div id="ema-board"></div>

<script>
    // --- 循環音樂控制邏輯 ---
    const bgm = document.getElementById('bgm-player');
    const musicBtn = document.getElementById('music-toggle');
    let isPlaying = false;

    // 設定音量（可選，0.5 為一半音量）
    bgm.volume = 0.6;

    function toggleMusic() {
        if (isPlaying) {
            bgm.pause();
            musicBtn.innerText = '🔇';
        } else {
            // 嘗試播放並處理瀏覽器阻擋
            bgm.play().then(() => {
                musicBtn.innerText = '🔊';
            }).catch(error => {
                alert("請點擊頁面任一處後再開啟音樂（瀏覽器安全限制）");
            });
        }
        isPlaying = !isPlaying;
    }

    // --- 核心功能 (隨機顏色/角度/愛心) ---
    function getRandomHexColor() {
        const letters = 'BCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * letters.length)];
        return color;
    }

    function getRandomRotate() { return Math.floor(Math.random() * 6) - 3; }

    let wishes = [
        { id: 1, author: "守護靈", content: "祝願所有來到這裡的人，都能心想事成！", likes: 8, comments: [], date: "2026/3/20", color: "#FFEB3B", rotate: -2 }
    ];

    function renderWishes() {
        const board = document.getElementById('ema-board');
        board.innerHTML = '';
        wishes.forEach(wish => {
            const container = document.createElement('div');
            container.className = 'ema-container';
            container.innerHTML = `
                <div class="ema-card" style="background-color: ${wish.color}; transform: rotate(${wish.rotate}deg);" onclick="this.classList.toggle('is-flipped')">
                    <div class="ema-front" style="background-color: ${wish.color};">
                        <div class="meta-top">祈願人：${wish.author}</div>
                        <div class="wish-content">「${wish.content}」</div>
                        <div class="footer-actions">
                            <span style="font-size: 0.7em;">${wish.date}</span>
                            <div style="position: relative;">
                                <button class="small-btn" onclick="event.stopPropagation(); handleLike(this, ${wish.id})">❤️ <span class="like-count">${wish.likes}</span></button>
                                <button class="small-btn" onclick="event.stopPropagation(); share('${wish.content}')">📤</button>
                            </div>
                        </div>
                    </div>
                    <div class="ema-back" style="background-color: ${wish.color};">
                        <strong style="font-size: 0.85em; border-bottom: 1px solid rgba(0,0,0,0.2);">📜 溫暖回饋</strong>
                        <div style="flex-grow:1; font-size:0.8em; margin-top:5px; overflow-y:auto; text-align:left;">
                            ${wish.comments.map(c => `<div style="margin-bottom:4px;"><b>${c.user}:</b> ${c.text}</div>`).join('') || '尚未有回覆...'}
                        </div>
                        <button class="small-btn" style="width:100%; margin-top:5px; background:var(--shrine-red); color:white;" onclick="event.stopPropagation(); leaveComment(${wish.id})">我也要留言</button>
                    </div>
                </div>
            `;
            board.appendChild(container);
        });
    }

    function handleLike(btnElement, id) {
        const wish = wishes.find(w => w.id === id);
        if (!wish) return;
        wish.likes++;
        btnElement.querySelector('.like-count').innerText = wish.likes;
        const existingHeart = btnElement.querySelector('.heart-pop');
        if (existingHeart) existingHeart.remove();
        void btnElement.offsetWidth;
        const heart = document.createElement('div');
        heart.className = 'heart-pop'; heart.innerHTML = '❤️';
        btnElement.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }

    function addNewWish() {
        const author = document.getElementById('author-name').value || "匿名旅人";
        const content = document.getElementById('wish-text').value;
        if (!content) return alert("請先寫下願望！");
        wishes.unshift({ id: Date.now(), author, content, likes: 0, comments: [], date: new Date().toLocaleDateString(), color: getRandomHexColor(), rotate: getRandomRotate() });
        renderWishes();
        document.getElementById('author-name').value = '';
        document.getElementById('wish-text').value = '';
    }

    function leaveComment(id) {
        const user = prompt("大名？") || "匿名者";
        const text = prompt("留言內容：");
        if (text) { wishes.find(w => w.id === id).comments.push({ user, text }); renderWishes(); }
    }

    function share(t) { navigator.share ? navigator.share({text: t}) : alert("已複製願望"); }

    renderWishes();
</script>
</body>
</html>
