<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 遊戲角色 Wiki 🎮</title>
    <style>
        :root { --wiki-gold: #f1c40f; --wiki-dark: #2c3e50; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background: var(--wiki-dark) url('夜景.jpg') no-repeat center center fixed;
            background-size: cover; margin: 0; color: white;
        }

        nav {
            background: rgba(0,0,0,0.85); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--wiki-gold);
            position: sticky; top: 0; z-index: 100;
        }
        .login-btn { background: var(--wiki-gold); border: none; padding: 8px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .login-btn:hover { background: #d4ac0d; }

        /* 編輯區域 */
        #admin-panel {
            background: rgba(255,255,255,0.95); color: #333;
            max-width: 600px; margin: 30px auto; padding: 25px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #admin-panel h3 { margin-top: 0; color: var(--wiki-dark); border-bottom: 2px solid var(--wiki-gold); padding-bottom: 10px; }
        input, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1em; }
        
        .save-btn { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; }
        .save-btn:active { transform: scale(0.98); }

        /* Wiki 網格 */
        #wiki-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; padding: 40px; max-width: 1400px; margin: auto;
        }
        
        /* 角色卡片排版：文字在上，圖片在下 */
        .char-card {
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 0; overflow: hidden; display: flex; flex-direction: column;
            position: relative; transition: 0.3s;
        }
        .char-card:hover { border-color: var(--wiki-gold); transform: translateY(-5px); }

        .char-content { padding: 20px; flex-grow: 1; }
        .char-name { font-size: 1.6em; color: var(--wiki-gold); font-weight: 900; margin-bottom: 10px; }
        .char-desc { font-size: 1em; line-height: 1.6; color: #eee; white-space: pre-wrap; }
        
        .char-divider { border-top: 1px solid rgba(255,255,255,0.2); margin: 0 20px; }
        
        .char-image { 
            width: 100%; max-height: 400px; object-fit: contain; 
            background: #111; display: block; 
        }
        
        .delete-btn {
            background: #e74c3c; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; position: absolute; top: 15px; right: 15px;
            font-size: 0.8em; z-index: 5; display: none;
        }
    </style>
</head>
<body>

    <nav>
        <h2>🎮 角色 Wiki 系統</h2>
        <div id="auth-section">
            <button class="login-btn" onclick="window.login()">Google 登入</button>
        </div>
    </nav>

    <div id="admin-panel">
        <h3>📝 登錄新角色</h3>
        <input type="text" id="char-name" placeholder="角色名稱">
        <textarea id="char-desc" placeholder="輸入角色描述與文字資訊..." rows="5"></textarea>
        <input type="text" id="char-img-url" placeholder="圖片連結網址">
        <button class="save-btn" id="submit-btn" onclick="window.saveChar()">確認保存</button>
        <p id="status-msg" style="text-align: center; font-size: 0.85em; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="wiki-grid"></div>
