<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - 專業版佈告欄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
    <style>
        body { 
            background-color: #0f172a; 
            background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
            color: white; min-height: 100vh;
        }
        /* 確保卡片高度獨立，不會互相撐開 */
        .geo-card {
            background: white;
            clip-path: polygon(0% 0%, 100% 0%, 100% 92%, 92% 100%, 0% 100%);
            align-self: start; 
            transition: all 0.3s ease;
        }
        .comment-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .comment-section.expand {
            max-height: 800px;
            opacity: 1;
            margin-top: 1rem;
        }
        /* 箭頭翻轉邏輯 */
        .arrow-toggle { 
            transition: transform 0.4s ease; 
            transform: rotate(0deg); 
        }
        .arrow-toggle.active { 
            transform: rotate(180deg); 
        }
        .glass-modal {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            cursor: grab;
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center border-b border-white/10 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-amber-400 rounded-full"></div>
            <span class="text-2xl font-black tracking-widest uppercase">Galeria</span>
        </div>
        <div id="auth-status"></div>
    </nav>

    <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 p-10 items-start"></div>

    <button id="add-btn" class="fixed bottom-10 right-10 w-20 h-20 bg-amber-400 text-black rounded-full shadow-2xl text-5xl z-50 hover:scale-110 transition">+</button>

    <div id="post-modal" class="fixed top-1/4 left-1/3 w-[400px] glass-modal p-8 hidden z-[60]">
        <input id="new-title" type="text" placeholder="主題" class="bg-transparent text-white text-2xl font-bold w-full border-b border-white/20 mb-6 outline-none">
        <textarea id="new-content" placeholder="內容..." class="bg-black/20 w-full h-32 rounded-xl p-4 text-white outline-none mb-6"></textarea>
        <div class="flex justify-between items-center text-white">
            <button onclick="document.getElementById('post-modal').classList.add('hidden')">取消</button>
            <button id="submit-post" class="bg-white text-black px-8 py-2 rounded-full font-bold">發佈</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        new Draggabilly('#post-modal');

        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('auth-status');
            statusBox.innerHTML = user ? `<button id="logout" class="text-xs opacity-50 uppercase text-white">${user.displayName} (登出)</button>` : `<button id="login" class="bg-amber-400 text-black px-4 py-2 rounded-full font-bold">登入</button>`;
            if(document.getElementById('logout')) document.getElementById('logout').onclick = () => signOut(auth);
            if(document.getElementById('login')) document.getElementById('login').onclick = () => signInWithPopup(auth, provider);
        });

        document.getElementById('add-btn').onclick = () => auth.currentUser ? document.getElementById('post-modal').classList.remove('hidden') : alert("請先登入");

        document.getElementById('submit-post').onclick = async () => {
            const t = document.getElementById('new-title').value;
            const c = document.getElementById('new-content').value;
            if(!t) return;
            await addDoc(collection(db, "posts"), {
                title: t, content: c, author: auth.currentUser.displayName,
                uid: auth.currentUser.uid, likes: [], createdAt: serverTimestamp()
            });
            document.getElementById('post-modal').classList.add('hidden');
        };

        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snapshot.forEach((fbDoc) => {
                const data = fbDoc.data();
                const id = fbDoc.id;
                const liked = data.likes?.includes(auth.currentUser?.uid);
                
                const card = document.createElement('div');
                card.className = "geo-card p-6 text-black flex flex-col shadow-xl";
                card.innerHTML = `
                    <div class="text-[10px] font-bold text-amber-500 mb-1">PROJECT ID: ${id.slice(0,6).toUpperCase()}</div>
                    <h3 class="text-2xl font-black mb-2">${data.title}</h3>
                    <p class="text-gray-600 mb-4 flex-grow">${data.content}</p>
                    <div class="flex justify-between items-center border-t pt-4">
                        <span class="text-[10px] text-gray-400 font-bold uppercase">BY ${data.author || 'Anonymous'}</span>
                        <button onclick="window.toggleLike('${id}', ${liked})" class="flex items-center gap-1 ${liked ? 'text-red-500' : 'text-gray-300'}">
                            <span>❤️</span> <span>${data.likes?.length || 0}</span>
                        </button>
                    </div>
                    <div class="flex justify-center mt-3">
                        <button onclick="window.toggleComments('${id}')" class="p-1 hover:text-amber-500 transition">
                            <svg id="arrow-${id}" class="arrow-toggle w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                    </div>
                    <div id="sec-${id}" class="comment-section" onclick="event.stopPropagation()">
                        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <div class="flex items-center gap-2 mb-3">
                                <input type="text" id="input-${id}" placeholder="留言內容..." 
                                    class="flex-grow text-xs bg-white rounded-lg px-3 py-2 border border-slate-200 outline-none focus:border-amber-400">
                                <button onclick="window.handleComment('${id}')" class="bg-amber-400 p-2 rounded-lg hover:bg-amber-500 transition shadow-sm">
                                    <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                                </button>
                            </div>
                            <div id="list-${id}" class="space-y-2 text-[11px] text-slate-600 max-h-40 overflow-y-auto pr-1"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                loadComments(id);
            });
        });

        // 留言處理函式 (改由按鈕點擊觸發)
        window.handleComment = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();
            if (!auth.currentUser) return alert("請先登入 Google 帳號");
            if (!text) return;

            try {
                await addDoc(collection(db, `posts/${postId}/comments`), {
                    text: text,
                    user: auth.currentUser.displayName,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (err) {
                console.error("留言失敗", err);
            }
        };

        window.toggleComments = (id) => {
            const target = document.getElementById(`sec-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isOpened = target.classList.contains('expand');
            
            // 收合其他卡片
            document.querySelectorAll('.comment-section').forEach(s => s.classList.remove('expand'));
            document.querySelectorAll('.arrow-toggle').forEach(a => a.classList.remove('active'));

            // 展開目前卡片並旋轉箭頭
            if(!isOpened) {
                target.classList.add('expand');
                arrow.classList.add('active');
            }
        };

        window.toggleLike = async (id, liked) => {
            if(!auth.currentUser) return alert("請先登入");
            await updateDoc(doc(db, "posts", id), {
                likes: liked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        function loadComments(postId) {
            onSnapshot(query(collection(db, `posts/${postId}/comments`), orderBy("createdAt", "asc")), (snap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = snap.docs.map(d => `
                        <div class="bg-white p-2 rounded shadow-sm border-l-2 border-amber-400">
                            <b class="text-amber-600 text-[9px] block uppercase">${d.data().user}</b>
                            <span>${d.data().text}</span>
                        </div>`).join('');
                }
            });
        }
    </script>
</body>
</html>
