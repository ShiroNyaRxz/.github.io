<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的公開佈告欄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #5d8a97; min-height: 100vh; font-family: sans-serif; }
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
        }
        /* 卡片懸浮效果 */
        .post-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body>

    <nav class="bg-black/20 backdrop-blur-md p-4 flex justify-between items-center text-white sticky top-0 z-40">
        <h1 class="text-xl font-bold tracking-tight">公開佈告欄</h1>
        <div id="auth-status">
            <button id="login-nav-btn" class="bg-white text-gray-900 px-5 py-2 rounded-full font-semibold">載入中...</button>
        </div>
    </nav>

    <div id="post-container" class="masonry-grid">
        </div>

    <button id="add-btn" class="fixed bottom-8 right-8 bg-white text-gray-900 w-16 h-16 rounded-full shadow-2xl text-4xl font-light flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
        +
    </button>

    <div id="post-modal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-zinc-900 w-full max-w-xl rounded-[2rem] p-8 shadow-2xl border border-zinc-800">
            <div class="flex justify-between items-center mb-6">
                <input id="new-title" type="text" placeholder="主題" class="bg-transparent text-white text-3xl font-bold focus:outline-none w-full placeholder-zinc-700">
                <button id="submit-post" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">發佈</button>
            </div>
            
            <div class="border-2 border-dashed border-zinc-700 rounded-2xl h-48 flex items-center justify-center gap-8 mb-6 text-zinc-500">
                <button title="檔案" class="hover:text-white text-3xl transition">📄</button>
                <button title="連結" class="hover:text-white text-3xl transition">🔗</button>
                <button title="相機" class="hover:text-white text-3xl transition">📷</button>
                <button title="搜尋" class="hover:text-white text-3xl transition">🔍</button>
            </div>

            <textarea id="new-content" placeholder="寫點美好的內容..." class="bg-transparent text-zinc-300 w-full h-40 resize-none focus:outline-none text-lg placeholder-zinc-800"></textarea>
            
            <div class="flex justify-end mt-4">
                <button id="close-modal" class="text-zinc-500 hover:text-zinc-300 transition text-sm">取消編輯</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f",
            measurementId: "G-DX84SV6K8R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const addBtn = document.getElementById('add-btn');
        const modal = document.getElementById('post-modal');
        const authStatus = document.getElementById('auth-status');

        // --- 1. 偵測登入狀態 ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 已登入：顯示頭像與登出按鈕
                authStatus.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-white/20">
                        <button id="logout-btn" class="text-sm opacity-70 hover:opacity-100">登出</button>
                    </div>
                `;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                // 未登入：顯示登入按鈕
                authStatus.innerHTML = `<button id="login-nav-btn" class="bg-white text-gray-900 px-5 py-2 rounded-full font-semibold">Google 登入</button>`;
                document.getElementById('login-nav-btn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        // --- 2. 新增按鈕偵測 (你的需求重點) ---
        addBtn.onclick = () => {
            const user = auth.currentUser;
            if (user) {
                // 已經登入：直接打開深色彈窗
                modal.classList.remove('hidden');
            } else {
                // 未登入：提示並觸發登入
                alert("請先登入 Google 帳號即可發佈貼文！");
                signInWithPopup(auth, provider).then((result) => {
                    // 登入成功後，自動幫他開啟彈窗
                    modal.classList.remove('hidden');
                }).catch((error) => {
                    console.log("登入被取消或失敗");
                });
            }
        };

        // --- 3. 關閉彈窗 ---
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');

        // --- 4. 發佈功能 ---
        document.getElementById('submit-post').onclick = async () => {
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').value;

            if (!title) return alert("請輸入主題！");

            try {
                await addDoc(collection(db, "posts"), {
                    title: title,
                    content: content,
                    authorName: auth.currentUser.displayName,
                    createdAt: serverTimestamp(),
                    uid: auth.currentUser.uid
                });
                modal.classList.add('hidden');
                document.getElementById('new-title').value = '';
                document.getElementById('new-content').value = '';
            } catch (e) {
                alert("發佈失敗！請確認 Firebase Rules 是否允許登入者寫入。");
            }
        };

        // --- 5. 監聽資料庫渲染貼文 ---
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const post = doc.data();
                const date = post.createdAt?.toDate().toLocaleDateString() || "傳送中...";
                container.innerHTML += `
                    <div class="post-card bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col p-6">
                        <h3 class="text-2xl font-bold text-gray-800 mb-2">${post.title}</h3>
                        <p class="text-gray-600 mb-6 leading-relaxed">${post.content || ''}</p>
                        <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center text-xs text-gray-400">
                            <span class="font-medium text-gray-500">${post.authorName || '匿名用戶'}</span>
                            <span>${date}</span>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
