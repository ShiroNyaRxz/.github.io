<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佈告欄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #5d8a97; min-height: 100vh; font-family: sans-serif; }
        /* 瀑布流網格 */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        /* 彈窗毛玻璃背景 */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <nav class="bg-black/20 backdrop-blur-md p-4 flex justify-between items-center text-white sticky top-0 z-40">
        <h1 class="text-xl font-bold tracking-tight">我的佈告欄</h1>
        <div id="auth-status">
            <button id="login-btn" class="bg-white text-gray-900 px-5 py-2 rounded-full font-semibold hover:bg-gray-100 transition">Google 登入</button>
        </div>
    </nav>

    <div id="post-container" class="masonry-grid">
        </div>

    <button id="add-btn" class="hidden fixed bottom-8 right-8 bg-white text-gray-900 w-16 h-16 rounded-full shadow-2xl text-4xl font-light flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
        +
    </button>

    <div id="post-modal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-zinc-900 w-full max-w-xl rounded-[2rem] p-8 shadow-2xl border border-zinc-800">
            <div class="flex justify-between items-center mb-6">
                <input id="new-title" type="text" placeholder="主題" class="bg-transparent text-white text-3xl font-bold focus:outline-none w-full placeholder-zinc-600">
                <button id="submit-post" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">發佈</button>
            </div>
            
            <div class="border-2 border-dashed border-zinc-700 rounded-2xl h-48 flex items-center justify-center gap-8 mb-6 text-zinc-500">
                <button title="檔案" class="hover:text-white text-3xl transition">📄</button>
                <button title="連結" class="hover:text-white text-3xl transition">🔗</button>
                <button title="相機" class="hover:text-white text-3xl transition">📷</button>
                <button title="搜尋" class="hover:text-white text-3xl transition">🔍</button>
            </div>

            <textarea id="new-content" placeholder="寫點美好的內容..." class="bg-transparent text-zinc-300 w-full h-40 resize-none focus:outline-none text-lg placeholder-zinc-700"></textarea>
            
            <div class="flex justify-end mt-4">
                <button id="close-modal" class="text-zinc-500 hover:text-zinc-300 transition text-sm">取消編輯</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // 1. 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f",
            measurementId: "G-DX84SV6K8R"
        };

        // 2. 【核心設定】請將下方字串替換為你在 Firestore 規則中允許的那個 UID
        const ADMIN_UID = "在這裡輸入你的_UID_字串"; 

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // DOM 元素
        const loginBtn = document.getElementById('login-btn');
        const authStatus = document.getElementById('auth-status');
        const addBtn = document.getElementById('add-btn');
        const modal = document.getElementById('post-modal');
        const postContainer = document.getElementById('post-container');

        // 登入事件
        loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authStatus.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-white/20">
                        <button id="logout-link" class="text-sm opacity-70 hover:opacity-100">登出</button>
                    </div>
                `;
                document.getElementById('logout-link').onclick = () => signOut(auth);

                // 權限檢查：只有 UID 匹配才顯示新增按鈕
                if (user.uid === ADMIN_UID) {
                    addBtn.classList.remove('hidden');
                } else {
                    addBtn.classList.add('hidden');
                }
            } else {
                authStatus.innerHTML = `<button id="re-login" class="bg-white text-gray-900 px-5 py-2 rounded-full font-semibold">Google 登入</button>`;
                document.getElementById('re-login').onclick = () => signInWithPopup(auth, provider);
                addBtn.classList.add('hidden');
            }
        });

        // 彈窗控制
        addBtn.onclick = () => modal.classList.remove('hidden');
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');

        // 發佈功能
        document.getElementById('submit-post').onclick = async () => {
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').value;

            if (!title) return alert("請輸入主題！");

            try {
                await addDoc(collection(db, "posts"), {
                    title: title,
                    content: content,
                    createdAt: serverTimestamp(),
                    uid: auth.currentUser.uid
                });
                modal.classList.add('hidden');
                document.getElementById('new-title').value = '';
                document.getElementById('new-content').value = '';
            } catch (e) {
                alert("發佈失敗，請確認你的 UID 權限是否正確！");
                console.error(e);
            }
        };

        // 監聽 Firestore 數據並渲染卡片
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            postContainer.innerHTML = '';
            snapshot.forEach((doc) => {
                const post = doc.data();
                const date = post.createdAt?.toDate().toLocaleDateString() || "剛才";
                
                const card = `
                    <div class="bg-white rounded-2xl shadow-xl hover:shadow-2xl transition-shadow overflow-hidden flex flex-col">
                        <div class="p-6">
                            <h3 class="text-2xl font-bold text-gray-800 mb-3">${post.title}</h3>
                            <p class="text-gray-600 leading-relaxed whitespace-pre-wrap">${post.content || ''}</p>
                        </div>
                        <div class="mt-auto px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center text-xs text-gray-400">
                            <span>${date}</span>
                            <span class="bg-gray-200 px-2 py-1 rounded">貼文</span>
                        </div>
                    </div>
                `;
                postContainer.innerHTML += card;
            });
        });
    </script>
</body>
</html>
