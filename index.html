<script type="module">
    // 1. 引入 Firebase SDK (包含 App 與 Database)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // 2. Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyBfSERMKFCSWRx3JyZAwtfZ9EPcndiH4U4",
        authDomain: "webhw-57e2e.firebaseapp.com",
        databaseURL: "https://webhw-57e2e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "webhw-57e2e",
        storageBucket: "webhw-57e2e.firebasestorage.app",
        messagingSenderId: "893204464032",
        appId: "1:893204464032:web:1d6dc5b5a0d625685664c5",
        measurementId: "G-4NJHP1B5M9"
    };

    // 初始化 Firebase 與資料庫
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const wishesRef = ref(db, 'wishes');

    // --- 核心：實時監測資料庫並顯示 ---
    onValue(wishesRef, (snapshot) => {
        const board = document.getElementById('ema-board');
        board.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            // 將資料從雲端抓下來顯示，最新發布的在前面
            Object.keys(data).reverse().forEach(key => {
                const wish = data[key];
                renderSingleWish(key, wish);
            });
        }
    });

    // 渲染單個許願卡
    function renderSingleWish(id, wish) {
        const board = document.getElementById('ema-board');
        const container = document.createElement('div');
        container.className = 'ema-container';
        
        // 處理留言列表 (防呆)
        const commentsHtml = wish.comments 
            ? Object.values(wish.comments).map(c => `<div style="margin-bottom:4px;"><b>${c.user}:</b> ${c.text}</div>`).join('') 
            : '尚未回覆...';

        container.innerHTML = `
            <div class="ema-card" style="transform: rotate(${wish.rotate}deg);" onclick="this.classList.toggle('is-flipped')">
                <div class="ema-front" style="background-color: ${wish.color};">
                    <div class="meta-top">祈願人：${wish.author}</div>
                    <div class="wish-content">「${wish.content}」</div>
                    <div class="footer-actions">
                        <span style="font-size: 0.7em;">${wish.date}</span>
                        <button class="small-btn" onclick="event.stopPropagation(); handleLike('${id}', ${wish.likes})">❤️ <span class="like-count">${wish.likes}</span></button>
                    </div>
                </div>
                <div class="ema-back" style="background-color: ${wish.color};">
                    <strong style="font-size: 0.85em; border-bottom: 1px solid rgba(0,0,0,0.2);">📜 溫暖回饋</strong>
                    <div style="flex-grow:1; font-size:0.8em; margin-top:5px; overflow-y:auto; text-align:left;">
                        ${commentsHtml}
                    </div>
                    <button class="small-btn" style="width:100%; margin-top:5px; background:var(--shrine-red); color:white;" onclick="event.stopPropagation(); leaveComment('${id}')">我也要留言</button>
                </div>
            </div>
        `;
        board.appendChild(container);
    }

    // --- 功能函式掛載到 window ---
    window.addNewWish = function() {
        const author = document.getElementById('author-name').value || "無名氏";
        const content = document.getElementById('wish-text').value;
        if (!content) return alert("請寫下願望內容");

        push(wishesRef, {
            author, 
            content,
            likes: 0,
            date: new Date().toLocaleDateString(),
            color: getRandomHexColor(),
            rotate: getRandomRotate()
        }).then(() => {
            document.getElementById('wish-text').value = '';
            document.getElementById('author-name').value = '';
        });
    };

    window.toggleMusic = function() {
        const bgm = document.getElementById('bgm-player');
        const musicBtn = document.getElementById('music-toggle');
        if (!bgm.paused) {
            bgm.pause(); musicBtn.innerText = '🔇';
        } else {
            bgm.play().then(() => { musicBtn.innerText = '🔊'; }).catch(() => alert("請先點擊頁面任意處再開啟"));
        }
    };

    window.handleLike = function(id, currentLikes) {
        update(ref(db, `wishes/${id}`), { likes: (currentLikes || 0) + 1 });
    };

    window.leaveComment = function(id) {
        const user = prompt("你的名字？") || "匿名者";
        const text = prompt("想說些什麼？");
        if (text) {
            push(ref(db, `wishes/${id}/comments`), { user, text });
        }
    };

    // 工具函式
    function getRandomHexColor() {
        const letters = 'BCDEF'; // 使用較淺的顏色確保文字清晰
        let color = '#';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * letters.length)];
        return color;
    }
    function getRandomRotate() { return Math.floor(Math.random() * 6) - 3; }
</script>
