<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - 純文字互動展版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), 
                        url('夜景.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 側邊面板：固定且帶有滑入動畫 */
        #side-panel {
            position: fixed; top: 0; left: 0; width: 400px; height: 100vh;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(25px);
            z-index: 100; padding: 40px; transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        #side-panel.open { transform: translateX(0); }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 90; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #overlay.show { opacity: 1; pointer-events: auto; }

        .geo-card {
            background: white; clip-path: polygon(0% 0%, 100% 0%, 100% 92%, 92% 100%, 0% 100%);
            align-self: start; color: #1e293b; transition: 0.3s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .comment-section { max-height: 0; opacity: 0; overflow: hidden; transition: 0.5s; }
        .comment-section.expand { max-height: 500px; opacity: 1; margin-top: 1rem; }
        .arrow-btn { transition: 0.4s; }
        .arrow-btn.active { transform: rotate(180deg); }
    </style>
</head>
<body>

    <div id="overlay" onclick="togglePanel()"></div>

    <nav class="p-8 flex justify-between items-center sticky top-0 bg-black/20 backdrop-blur-lg z-40 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-full"></div>
            <span class="text-3xl font-black italic">GALERIA</span>
        </div>
        <div id="auth-status"></div>
    </nav>

    <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 p-12 items-start">
        </div>

    <div id="side-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black tracking-widest uppercase">New Idea</h2>
            <button onclick="togglePanel()" class="text-white/30 hover:text-white">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>

        <input type="text" id="new-title" class="w-full bg-transparent border-b-2 border-white/10 p-2 text-2xl font-black outline-none mb-8 focus:border-amber-400" placeholder="主題標題...">

        <textarea id="new-content" 
            class="w-full h-64 bg-black/30 border border-white/5 rounded-3xl p-6 text-white outline-none focus:border-amber-400/40 mb-10 resize-none"
            placeholder="寫下您的想法..."></textarea>

        <div class="mt-auto">
            <button id="submit-post" class="w-full bg-amber-400 text-black py-5 rounded-3xl font-black text-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                發佈文字貼文
            </button>
        </div>
    </div>

    <button onclick="togglePanel()" class="fixed bottom-12 right-12 w-24 h-24 bg-amber-400 text-black rounded-full shadow-2xl text-6xl z-50 hover:scale-110 active:scale-90 transition-all flex items-center justify-center">
        <i class="fa-solid fa-plus"></i>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.togglePanel = () => {
            document.getElementById('side-panel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        };

        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('auth-status');
            statusBox.innerHTML = user ? 
                `<button id="logout" class="text-[10px] text-white/50 font-black uppercase tracking-widest">${user.displayName} (登出)</button>` : 
                `<button id="login" class="bg-amber-400 text-black px-8 py-2.5 rounded-full font-black shadow-lg">GOOGLE 登入</button>`;
            if(document.getElementById('logout')) document.getElementById('logout').onclick = () => signOut(auth);
            if(document.getElementById('login')) document.getElementById('login').onclick = () => signInWithPopup(auth, provider);
        });

        // 簡化後的發佈邏輯 (移除 Storage 圖片處理)
        document.getElementById('submit-post').onclick = async () => {
            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            const btn = document.getElementById('submit-post');

            if(!auth.currentUser) return alert("請先登入！");
            if(!title) return alert("請輸入標題");

            btn.disabled = true;
            btn.innerText = "正在發佈...";

            try {
                await addDoc(collection(db, "posts"), {
                    title, content,
                    author: auth.currentUser.displayName,
                    createdAt: serverTimestamp(),
                    likes: []
                });

                document.getElementById('new-title').value = '';
                document.getElementById('new-content').value = '';
                togglePanel();
            } catch (e) {
                console.error(e);
                alert("發佈失敗，請檢查資料庫規則設定");
            } finally {
                btn.disabled = false;
                btn.innerText = "發佈文字貼文";
            }
        };

        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snapshot.forEach((fbDoc) => {
                const data = fbDoc.data();
                const id = fbDoc.id;
                const liked = data.likes?.includes(auth.currentUser?.uid);
                
                const card = document.createElement('div');
                card.className = "geo-card p-8 flex flex-col";
                card.innerHTML = `
                    <div class="text-[9px] font-black text-amber-500 mb-2 tracking-widest uppercase italic">POST #${id.slice(0,5)}</div>
                    <h3 class="text-3xl font-black mb-4 text-slate-900 leading-tight">${data.title}</h3>
                    <p class="text-slate-600 mb-8 flex-grow text-sm leading-relaxed">${data.content}</p>
                    
                    <div class="flex justify-between items-center border-t border-slate-100 pt-6">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">By ${data.author || 'Member'}</span>
                        <button onclick="window.toggleLike('${id}', ${liked})" class="flex items-center gap-2 ${liked ? 'text-red-500' : 'text-slate-200'} transition-all hover:scale-110">
                            <span class="text-2xl">${liked ? '❤️' : '🤍'}</span> 
                            <span class="text-xs font-black text-slate-400">${data.likes?.length || 0}</span>
                        </button>
                    </div>

                    <div class="flex justify-center mt-4">
                        <button onclick="window.toggleComments('${id}')" class="p-2 text-slate-200 hover:text-amber-500 transition-all">
                            <i id="arrow-${id}" class="fa-solid fa-chevron-down arrow-btn text-2xl"></i>
                        </button>
                    </div>

                    <div id="sec-${id}" class="comment-section">
                        <div class="bg-slate-50 rounded-3xl p-6 border border-slate-200">
                            <div class="flex items-center gap-3 mb-6">
                                <input type="text" id="input-${id}" placeholder="發表留言..." 
                                    class="flex-grow bg-white rounded-2xl px-5 py-3 border focus:border-amber-400 outline-none shadow-sm text-slate-800 text-sm">
                                <button onclick="window.submitComment('${id}')" class="bg-amber-400 p-3.5 rounded-2xl shadow-lg">
                                    <i class="fa-solid fa-paper-plane text-black"></i>
                                </button>
                            </div>
                            <div id="list-${id}" class="space-y-4 max-h-64 overflow-y-auto pr-2"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                loadComments(id);
            });
        });

        window.submitComment = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            if(!auth.currentUser || !input.value.trim()) return;
            await addDoc(collection(db, "posts", postId, "comments"), {
                text: input.value.trim(), user: auth.currentUser.displayName, createdAt: serverTimestamp()
            });
            input.value = '';
        };

        window.toggleComments = (id) => {
            const target = document.getElementById(`sec-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isOpened = target.classList.contains('expand');
            if(!isOpened) { target.classList.add('expand'); arrow.classList.add('active'); }
            else { target.classList.remove('expand'); arrow.classList.remove('active'); }
        };

        window.toggleLike = async (id, liked) => {
            if(!auth.currentUser) return alert("請先登入");
            await updateDoc(doc(db, "posts", id), {
                likes: liked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        function loadComments(postId) {
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")), (snap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = snap.docs.map(d => `
                        <div class="bg-white p-4 rounded-2xl border-l-4 border-amber-400 shadow-sm">
                            <b class="text-amber-600 text-[10px] uppercase block mb-1 font-black">${d.data().user}</b>
                            <span class="text-slate-700 font-semibold text-xs leading-relaxed">${d.data().text}</span>
                        </div>`).join('');
                }
            });
        }
    </script>
</body>
</html>
