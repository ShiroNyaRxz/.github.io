<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 安全防護許願牆 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; --gray: #888; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        .sub-title { color: #f0f0f0; text-align: center; margin-bottom: 30px; font-size: 0.9em; }
        
        /* 輸入區 */
        .input-section { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 40px; width: 100%; max-width: 450px; 
        }
        .nickname-input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .primary-btn { background: var(--shrine-red); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        .primary-btn:disabled { background: var(--gray); cursor: not-allowed; }

        /* 許願卡片 */
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; padding-bottom: 50px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; border-radius: 0 0 10px 10px; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.8em; color: rgba(0,0,0,0.7); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .wish-content { font-size: 1.1em; font-weight: bold; color: var(--text-color); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow-y: auto; word-break: break-all; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .small-btn { background: rgba(0,0,0,0.1); border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .small-btn.active { background: #ff4d4d !important; color: white !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <header><h1>⛩️ 安全許願牆 ⛩️</h1></header>
    </div>

    <div class="sub-title">已啟動 XSS 防護系統｜每五分鐘限許一願</div>

    <div class="input-section">
        <input type="text" id="custom-nickname" class="nickname-input" placeholder="您的名號 (限15字)" maxlength="15">
        <textarea id="wish-text" rows="3" placeholder="請在此誠心寫下您的願望 (限100字)..." maxlength="100"></textarea>
        <button class="primary-btn" id="submit-wish-btn" onclick="window.addNewWish()">奉納願望</button>
    </div>

    <div id="ema-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ssgEtDNWVhbemhduXU7qD-31DCFPr4o",
            authDomain: "webhw-eca0a.firebaseapp.com",
            projectId: "webhw-eca0a",
            databaseURL: "https://webhw-eca0a-default-rtdb.firebaseio.com", 
            storageBucket: "webhw-eca0a.firebasestorage.app",
            messagingSenderId: "334763145278",
            appId: "1:334763145278:web:fee884425309a3e471b96f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishesRef = ref(db, 'wishes');

        // --- 防禦核心：HTML 轉義函式 ---
        function sanitize(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        let deviceId = localStorage.getItem('shrine_device_id') || ('dev_' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('shrine_device_id', deviceId);

        function updateCooldown() {
            const btn = document.getElementById('submit-wish-btn');
            const lastPostTime = localStorage.getItem('last_post_time');
            const cooldown = 5 * 60 * 1000;
            if (lastPostTime) {
                const diff = Date.now() - parseInt(lastPostTime);
                if (diff < cooldown) {
                    const rem = Math.ceil((cooldown - diff) / 1000);
                    btn.disabled = true;
                    btn.innerText = `冷卻中 (${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')})`;
                    setTimeout(updateCooldown, 1000);
                    return;
                }
            }
            btn.disabled = false;
            btn.innerText = "正式奉納願望";
        }
        updateCooldown();

        onValue(wishesRef, (snapshot) => {
            const board = document.getElementById('ema-board');
            board.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const wish = data[key];
                    const isLiked = wish.voters && wish.voters[deviceId];
                    renderSingleWish(board, key, wish, isLiked);
                });
            }
        });

        function renderSingleWish(board, id, wish, isLiked) {
            const container = document.createElement('div');
            container.className = 'ema-container';
            
            // 安全處理：先轉義所有來自資料庫的字串
            const safeNickname = sanitize(wish.nickname || '無名氏');
            const safeContent = sanitize(wish.content || '');
            const safeDate = sanitize(wish.date || '');

            container.innerHTML = `
                <div class="ema-card" onclick="this.classList.toggle('is-flipped')">
                    <div class="ema-front" style="background-color: ${wish.color || '#fff9c4'};">
                        <div class="meta-top">祈願人：${safeNickname}</div>
                        <div class="wish-content">「${safeContent}」</div>
                        <div class="footer-actions">
                            <span style="font-size: 0.7em;">${safeDate}</span>
                            <button class="small-btn ${isLiked ? 'active' : ''}" onclick="event.stopPropagation(); window.handleLike('${id}')">
                                ❤️ <span class="like-count">${wish.likes || 0}</span>
                            </button>
                        </div>
                    </div>
                    <div class="ema-back" style="background-color: ${wish.color || '#fff9c4'};">
                        <strong style="font-size: 0.85em;">📜 溫暖回饋</strong>
                        <div style="flex-grow:1; font-size:0.8em; overflow-y:auto; margin-top:5px;" id="comments-${id}"></div>
                        <button class="small-btn" style="width:100%; margin-top:5px; background:var(--shrine-red); color:white;" onclick="event.stopPropagation(); window.leaveComment('${id}')">我也要留言</button>
                    </div>
                </div>
            `;
            board.appendChild(container);

            // 留言部分也使用安全方式渲染
            const commentBox = document.getElementById(`comments-${id}`);
            if (wish.comments) {
                Object.values(wish.comments).forEach(c => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '3px';
                    const b = document.createElement('b');
                    b.textContent = c.user + ': '; // 安全賦值
                    div.appendChild(b);
                    div.append(document.createTextNode(c.text)); // 安全賦值
                    commentBox.appendChild(div);
                });
            } else {
                commentBox.textContent = '尚未有回饋...';
            }
        }

        window.addNewWish = function() {
            const nickname = document.getElementById('custom-nickname').value.trim();
            const content = document.getElementById('wish-text').value.trim();
            if (!content) return alert("請輸入願望內容");

            push(wishesRef, {
                nickname: nickname || "無名氏",
                content: content,
                likes: 0,
                voters: {},
                date: new Date().toLocaleDateString(),
                color: ['#fff9c4', '#f8bbd0', '#e1f5fe', '#e8f5e9'][Math.floor(Math.random() * 4)],
                rotate: Math.floor(Math.random() * 6) - 3
            }).then(() => {
                localStorage.setItem('last_post_time', Date.now());
                updateCooldown();
                document.getElementById('wish-text').value = '';
                document.getElementById('custom-nickname').value = '';
            });
        };

        window.handleLike = (id) => {
            runTransaction(ref(db, `wishes/${id}`), (wish) => {
                if (wish) {
                    wish.voters = wish.voters || {};
                    if (wish.voters[deviceId]) { wish.likes--; delete wish.voters[deviceId]; }
                    else { wish.likes = (wish.likes || 0) + 1; wish.voters[deviceId] = true; }
                }
                return wish;
            });
        };

        window.leaveComment = (id) => {
            const user = prompt("您的名號？") || "訪客";
            const text = prompt("留下一句溫暖的話：");
            if (text) push(ref(db, `wishes/${id}/comments`), { user, text });
        };
    </script>
</body>
</html>
