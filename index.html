<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 許願牆 ⛩️</title>
    <style>
        :root { --shrine-red: #ff4d4d; --text-color: #3e2723; }
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('夜景.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 5px double var(--shrine-red); padding-bottom: 10px; }
        header h1 { color: white; margin: 0; text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); }
        #music-toggle { background: rgba(255, 255, 255, 0.2); border: 1px solid white; color: white; font-size: 22px; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; backdrop-filter: blur(5px); }
        .sub-title { color: #f0f0f0; text-align: center; margin-bottom: 30px; font-size: 0.9em; }
        .input-section { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding: 20px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); margin-bottom: 40px; width: 100%; max-width: 450px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .primary-btn { background: var(--shrine-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        
        #ema-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; width: 100%; max-width: 1200px; perspective: 1000px; padding-bottom: 50px; }
        .ema-container { width: 280px; height: 200px; position: relative; margin: 0 auto; }
        .ema-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .ema-card.is-flipped { transform: rotateY(180deg) !important; }
        .ema-front, .ema-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); 
            padding: 45px 25px 20px; box-sizing: border-box; display: flex; flex-direction: column; 
        }
        .ema-front { z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ema-back { transform: rotateY(180deg); filter: brightness(0.92); }
        .meta-top { font-size: 0.8em; color: rgba(0,0,0,0.5); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; }
        .wish-content { font-size: 1.1em; font-weight: bold; color: var(--text-color); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        
        /* 點讚按鈕動畫與顏色 */
        .small-btn { 
            background: rgba(0,0,0,0.1); border: none; padding: 5px 12px; border-radius: 20px; 
            font-size: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; gap: 4px; 
        }
        /* 點讚後的狀態：變紅 */
        .small-btn.active { 
            background: #ff4d4d !important; 
            color: white !important; 
            transform: scale(1.1); 
            box-shadow: 0 2px 10px rgba(255, 77, 77, 0.5); 
        }
        .small-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <audio id="bgm-player" src="bgm.mp3" loop preload="auto"></audio>

    <div class="header-container">
        <header><h1>⛩️ 許願牆 ⛩️</h1></header>
        <button id="music-toggle" onclick="toggleMusic()">靜</button>
    </div>
    <div class="sub-title">留下你的願望，說不定會實現喔！</div>

    <div class="input-section">
        <input type="text" id="author-name" placeholder="你的大名">
        <textarea id="wish-text" rows="3" placeholder="寫下你的願望..."></textarea>
        <button class="primary-btn" onclick="addNewWish()">奉納 (掛上願望)</button>
    </div>

    <div id="ema-board"></div>
